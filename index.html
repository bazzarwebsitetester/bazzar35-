<!DOCTYPE html>
<html>
<head>
<title>AI Bazaar Trading Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:#e6e6e6}
.header{padding:12px;background:#111827;border-bottom:1px solid #222}
.container{display:grid;grid-template-columns:260px 1fr;height:100vh}
.sidebar{background:#0f172a;padding:10px;border-right:1px solid #222}
.main{padding:12px}

select,button{
    width:100%;padding:8px;margin-bottom:8px;
    background:#111827;color:white;border:none
}

.toggle{background:#111827;padding:8px;border:1px solid #333;cursor:pointer}

.kpis{display:flex;gap:10px;margin-bottom:10px}
.card{flex:1;background:#111827;padding:10px;border-radius:6px}

table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px solid #222;text-align:center}
th{background:#111827}

canvas{background:#0f172a;margin-top:10px;padding:10px;border-radius:8px}
</style>
</head>

<body>

<div class="header">
<h2>🤖 AI Bazaar Trading Dashboard</h2>
<span id="status">Loading...</span>
</div>

<div class="container">

<div class="sidebar">
<div class="toggle" onclick="toggleManipulation()">
🧠 Manipulation: <span id="manState">ON</span>
</div>

<select id="itemSelect" onchange="drawChart()"></select>
</div>

<div class="main">

<div class="kpis">
<div class="card"><h4>🔥 Best PPH</h4><p id="bestPH">-</p></div>
<div class="card"><h4>📊 Items</h4><p id="itemCount">0</p></div>
</div>

<table id="table"></table>

<canvas id="chart" height="120"></canvas>

</div>
</div>

<script>

const TAX = 0.01125;
let showManipulation = true;
let allItems = [];
let chart;

/* =========================
   TOGGLE
========================= */
function toggleManipulation(){
    showManipulation = !showManipulation;
    manState.innerText = showManipulation ? "ON":"OFF";
}

/* =========================
   HISTORY
========================= */
function saveHistory(item, price){
    let h = JSON.parse(localStorage.getItem(item)||"[]");
    h.push({time:Date.now(),price});
    if(h.length>200)h.shift();
    localStorage.setItem(item,JSON.stringify(h));
}
function getHistory(item){
    return JSON.parse(localStorage.getItem(item)||"[]");
}

/* =========================
   CORE AI
========================= */
function regression(h){
    if(h.length<10)return null;
    let n=h.length,sx=0,sy=0,sxy=0,sxx=0;
    for(let i=0;i<n;i++){
        sx+=i; sy+=h[i].price;
        sxy+=i*h[i].price; sxx+=i*i;
    }
    let d=n*sxx-sx*sx;
    if(d===0)return null;
    let slope=(n*sxy-sx*sy)/d;
    let b=(sy-slope*sx)/n;
    return slope*n+b;
}

function trend(h){
    let s=regression(h.slice(-10));
    let l=regression(h.slice(-50));
    if(!s||!l)return "STABLE";
    if(s>l*1.01)return "UP";
    if(s<l*0.99)return "DOWN";
    return "STABLE";
}

function pump(h){
    let avg=h.reduce((a,b)=>a+b.price,0)/h.length;
    return h[h.length-1].price>avg*1.25;
}

/* =========================
   LIQUIDITY + PPH
========================= */
function hourlyVol(s){ return s.sellMovingWeek/168 }
function truePPH(buy,sell,s){
    let profit=(sell-buy)-(sell*TAX);
    return profit>0 ? profit*hourlyVol(s) : 0;
}

/* =========================
   MARKET INTEL
========================= */
function cycle(h){
    if(h.length<30)return "MID";
    let p=h.map(x=>x.price);
    let min=Math.min(...p),max=Math.max(...p);
    let pos=(p[p.length-1]-min)/(max-min);
    if(pos<0.25)return "BOTTOM";
    if(pos>0.75)return "TOP";
    return "MID";
}

function spread(h){
    if(h.length<20)return false;
    let r=h.slice(-10).map(x=>x.price);
    let o=h.slice(-20,-10).map(x=>x.price);
    let ra=r.reduce((a,b)=>a+b,0)/r.length;
    let oa=o.reduce((a,b)=>a+b,0)/o.length;
    return ra<oa*0.98;
}

/* =========================
   SIGNALS
========================= */
function buySig(roi,h){
    if(h.length<20)return "WAIT";
    if(pump(h))return "❌ MANIP";

    let c=h[h.length-1].price;
    let p=regression(h);

    if(cycle(h)==="BOTTOM")return "🟢 BUY";
    if(p && p>c*1.02)return "🟢 EARLY";

    return "❌ AVOID";
}

function sellSig(roi,h){
    if(h.length<20)return "HOLD";

    if(roi>10)return "💰 PROFIT";
    if(cycle(h)==="TOP")return "📈 TOP";
    if(trend(h)==="DOWN")return "📉 EXIT";
    if(spread(h))return "⚠ SPREAD";

    return "HOLD";
}

/* =========================
   ALERTS
========================= */
function alertUser(text){
    console.log("ALERT:",text);
    try{
        new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
    }catch(e){}
}

/* =========================
   LOAD DATA
========================= */
async function load(){

    let res = await fetch("https://api.hypixel.net/skyblock/bazaar");
    let data = await res.json();

    let items=[];

    for(let id in data.products){

        let s=data.products[id].quick_status;
        if(!s || s.sellMovingWeek<100000)continue;

        let buy=s.sellPrice;
        let sell=s.buyPrice;
        if(!buy||!sell)continue;

        let profit=(sell-buy)-(sell*TAX);
        let roi=(profit/buy)*100;

        let name=id.replaceAll("_"," ");

        saveHistory(name,buy);
        let h=getHistory(name);

        let b=buySig(roi,h);
        let se=sellSig(roi,h);

        if(!showManipulation && b.includes("MANIP"))continue;

        if(b.includes("BUY")) alertUser(name+" BUY");
        if(se.includes("PROFIT")||se.includes("EXIT")) alertUser(name+" SELL");

        items.push({
            name,price:buy,roi,
            buy:b,sell:se,
            pph:truePPH(buy,sell,s)
        });
    }

    items.sort((a,b)=>b.pph-a.pph);
    items=items.slice(0,10);

    allItems=items;
    render(items);
    fillSelector(items);

    status.innerText="🟢 LIVE";
}

/* =========================
   RENDER
========================= */
function render(items){

    table.innerHTML=`
    <tr>
    <th>Item</th><th>Price</th><th>ROI</th>
    <th>PPH</th><th>Buy</th><th>Sell</th>
    </tr>`;

    bestPH.innerText = items[0]?.pph.toFixed(0)||"-";
    itemCount.innerText = items.length;

    items.forEach(i=>{
        table.innerHTML+=`
        <tr>
        <td>${i.name}</td>
        <td>${i.price.toFixed(1)}</td>
        <td>${i.roi.toFixed(2)}</td>
        <td>${i.pph.toFixed(0)}</td>
        <td>${i.buy}</td>
        <td>${i.sell}</td>
        </tr>`;
    });
}

/* =========================
   SELECTOR + CHART
========================= */
function fillSelector(items){
    itemSelect.innerHTML="";
    items.forEach(i=>{
        let o=document.createElement("option");
        o.value=i.name;
        o.text=i.name;
        itemSelect.appendChild(o);
    });
}

function drawChart(){

    let item=itemSelect.value;
    let h=getHistory(item);

    let labels=h.map(x=>new Date(x.time).toLocaleTimeString());
    let data=h.map(x=>x.price);

    if(chart) chart.destroy();

    chart=new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
            labels,
            datasets:[{
                label:item,
                data,
                borderColor:"#22c55e"
            }]
        }
    });
}

/* =========================
   LOOP
========================= */
async function loop(){
    await load();
    setTimeout(loop,5000);
}

loop();

</script>
</body>
</html>
